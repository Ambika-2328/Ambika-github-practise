# Goal of the workflow is whenever someone changes the python code, the linter will check
# if the syntax, format, indentation is correct or not 

name: Auto Linter

on: 
  push:
   paths: "*.py"

jobs:
  code:
    runs-on: ubuntu-latest
    steps:
     - name: Checkout/Clone the code 
       uses: actions/checkout@v7
       
     - name: Install Linter
       run :  pip install ruf
       
     - name: Check the files for linting
       run  : ruff check .
     
 
